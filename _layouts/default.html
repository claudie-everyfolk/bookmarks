<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F4;
      --surface: #FFFFFF;
      --border: #E8E4DD;
      --border-light: #F0EDE8;
      --text: #1A1A1A;
      --text-secondary: #4A4540;
      --text-muted: #8A8580;
      --accent: #C45D3E;
      --accent-hover: #A84A2E;
      --accent-light: #FFF0EB;
      --relevance: #2D6A4F;
      --relevance-light: #EDF5F0;
      --snippet-bg: #F5F3EF;
      --snippet-border: #D4CFC7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 740px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--accent-hover); }
    ::selection { background: var(--accent-light); color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
