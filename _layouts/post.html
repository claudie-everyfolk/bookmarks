<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F4;
      --surface: #FFFFFF;
      --border: #E8E4DD;
      --border-light: #F0EDE8;
      --text: #1A1A1A;
      --text-secondary: #4A4540;
      --text-muted: #8A8580;
      --accent: #C45D3E;
      --accent-hover: #A84A2E;
      --accent-light: #FFF0EB;
      --relevance: #2D6A4F;
      --relevance-light: #EDF5F0;
      --snippet-bg: #F5F3EF;
      --snippet-border: #D4CFC7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 740px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--accent-hover); }
    ::selection { background: var(--accent-light); color: var(--accent); }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    .post-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }
    .post-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.7rem;
      color: var(--accent);
      background: var(--accent-light);
      border-radius: 4px;
      margin-bottom: 2rem;
      transition: all 0.15s;
    }
    .source-link:hover { background: var(--accent); color: white; }

    .post-body { font-size: 0.92rem; line-height: 1.7; color: var(--text-secondary); }
    .post-body h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin: 2rem 0 0.75rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .post-body h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1.75rem 0 0.5rem;
      color: var(--text);
    }
    .post-body h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 1.25rem 0 0.4rem;
      color: var(--text-secondary);
    }
    .post-body p { margin-bottom: 0.85rem; }
    .post-body blockquote {
      border-left: 2.5px solid var(--snippet-border);
      padding: 0.65rem 1rem;
      margin: 1.25rem 0;
      background: var(--snippet-bg);
      border-radius: 0 4px 4px 0;
      font-style: italic;
      color: var(--text-secondary);
    }
    .post-body ul, .post-body ol { margin: 0.5rem 0 0.85rem 1.5rem; }
    .post-body li { margin-bottom: 0.3rem; }
    .post-body code {
      background: var(--snippet-bg);
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      font-size: 0.88em;
      color: var(--accent);
    }
    .post-body strong { color: var(--text); font-weight: 600; }
    .post-body a { text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--border); }
    .post-body a:hover { text-decoration-color: var(--accent); }

    .post-divider {
      width: 2rem;
      height: 2px;
      background: var(--border);
      margin: 2.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="{{ site.baseurl }}/" class="back-link">&larr; All bookmarks</a>
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.url_source %}<a href="{{ page.url_source }}" class="source-link">View source ↗</a>{% endif %}
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</body>
</html>
