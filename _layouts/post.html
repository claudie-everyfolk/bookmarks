<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .back-link:hover { color: var(--accent); }
    .post-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    .post-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    .source-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      padding: 0.4rem 0.8rem;
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .post-body h1 { font-size: 1.3rem; margin: 1.5rem 0 0.75rem; }
    .post-body h2 { font-size: 1.1rem; margin: 1.25rem 0 0.5rem; color: var(--text); }
    .post-body h3 { font-size: 1rem; margin: 1rem 0 0.5rem; color: var(--text-muted); }
    .post-body p { margin-bottom: 0.75rem; }
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: var(--surface);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }
    .post-body ul, .post-body ol { margin: 0.5rem 0 0.75rem 1.5rem; }
    .post-body li { margin-bottom: 0.25rem; }
    .post-body code {
      background: var(--surface);
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .post-body strong { color: #f0f6fc; }
  </style>
</head>
<body>
  <div class="container">
    <a href="{{ site.baseurl }}/" class="back-link">&larr; All bookmarks</a>
    <div class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.url_source %}<a href="{{ page.url_source }}" class="source-link">View source &rarr;</a>{% endif %}
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</body>
</html>
